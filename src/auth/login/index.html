<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Login | FinTrack</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4 bg-white dark:bg-slate-900">
<div class="flex items-center gap-3">
<div class="text-primary">
<svg class="size-8" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_330)">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</g>
<defs>
<clippath id="clip0_6_330"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-extrabold leading-tight tracking-tight">FinTrack</h2>
</div>
<div class="flex items-center gap-4">
<span class="hidden md:inline text-sm text-slate-500 dark:text-slate-400">New here?</span>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-lg h-10 px-5 bg-primary text-white text-sm font-bold leading-normal transition-opacity hover:opacity-90">
                    Sign Up
                </button>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 bg-background-light dark:bg-background-dark">
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 p-8 md:p-10">
<div class="text-center mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold mb-2">Welcome back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please enter your details to sign in</p>
</div>
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 rounded-lg py-3 px-4 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="Google logo" class="w-5 h-5" data-alt="Official Google G colorful icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJMIeN8nl_GvdPCuEG8Qbfb1OlpB_f-mAOSFox7_z981WHBqghgwSLaliruzjh1_FKwhOXaqOplaN0_By_NqYhGj1xWe72J1MM19hOGHbzImi2jBXLYNNoWaOH8D4LNQeFMXsRX7CEL62y6tgGFwG9YTYdDCB8oLkxzHWbOYoCeUS_4T8HACEGOOBjLTEXCSn--IR1_HkjBAQxE3tFMIAzYJN4HLzqkZ_iRL_LFX5cKvrKjRQUPVwm9jXmewnjnX4j5LSlY6sIA_E"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 rounded-lg py-3 px-4 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-xl">ios</span>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
<div class="relative mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-3 text-slate-400">Or continue with email</span>
</div>
</div>
<form class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Email address</label>
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-3.5 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="name@example.com" type="email" value=""/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
<a class="text-primary text-xs font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-3.5 pr-11 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="••••••••" type="password" value=""/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 py-1">
<input class="w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full bg-primary text-white font-bold py-4 rounded-lg hover:opacity-90 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<div class="mt-8 text-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Don't have an account?</span>
<a class="text-primary font-bold hover:underline ml-1" href="#">Create an account</a>
</div>
</div>
</main>
<footer class="py-6 text-center text-slate-400 text-xs">
<p>© 2024 FinTrack Inc. All rights reserved.</p>
<div class="flex justify-center gap-4 mt-2">
<a class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">Terms of Service</a>
</div>
</footer>
</div>
</body></html>
