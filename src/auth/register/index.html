<span class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white font-display">FinTrack</span>

</div>
</div>
</div>
</header>
<!-- Main Content: Centered Registration Card -->
<main class="flex-grow flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
<div class="max-w-md w-full space-y-8 bg-white dark:bg-slate-900/50 p-8 rounded-xl shadow-xl border border-slate-200 dark:border-slate-800">
<div class="text-center">
<h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Create your account</h1>
<p class="mt-2 text-sm text-slate-600 dark:text-slate-400">
                    Start your journey to financial freedom today
                </p>
</div>
<!-- Social Signups -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 px-4 py-2 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfr809AKrq6fK30KZgTYrM33iaAt975UDeotAkGI0yblBauUGTP6My9R_ljfubC-seDjt1Z7DueotISpxU79qnw7bScRODjIo_6V-WZuqI7LdM8Mf_MmyDnkQ1huH4fZK5-VcGiNXYtmSyF4pcvXcudnscIdfdKyIwyqX0_W0TaMTbz8lr7cyKb2W6HIcEPg7ZFysvt2ucQiAuT5tq0Solg5x4Dlal_gljSjopTqMLsW33a_vllXXtm_WJ3hGbagFxJpXsw5nckbE"/>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-2 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="Apple Logo" class="w-5 h-5" data-alt="Apple dark grey logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2hkUZGK9_19yCYodJcOXPFPLD-1FEj4h0zLsM__enk73dMya6nUz7nLL5yxbQsEcwfYaVDMeKUL7kk9coofDGkuJHl3jRs872DpoxEOTDdH5mxZoaUmOKHUlW-Yo8XmVowGJ4kNS-oHIAXp6G9UL0KA8fM14HiTvvCcWRVjtaS8HDPV3eN0exIigt6KL6WEyHJ9LyA-apSxiz2JEtWc2Dn9ryrcUBH_aJtHFrn2zbVegw6PXH8atfHxiGfMc4U6ew3AVkkimgQjk"/>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Apple</span>
</button>
</div>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-xs text-slate-400 uppercase tracking-widest font-bold">Or continue with email</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<!-- Registration Form -->
<form action="#" class="mt-8 space-y-5">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1" for="full-name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400" id="full-name" name="name" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined text-lg">visibility</span>
</div>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1" for="confirm-password">Confirm Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">shield</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400" id="confirm-password" name="confirm-password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start">
<div class="flex items-center h-5">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-xs">
<label class="text-slate-600 dark:text-slate-400" for="terms">
                            I agree to the <a class="text-primary font-bold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-bold hover:underline" href="#">Privacy Policy</a>
</label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-extrabold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all" type="submit">
                    Create Account
                </button>
</form>
<div class="mt-6 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                    Already have an account? 
                    <a class="font-extrabold text-primary hover:text-primary/80 transition-colors ml-1" href="#">Log in here</a>
</p>
</div>

<footer class="py-6 border-t border-slate-200 dark:border-slate-800">
<div class="max-w-7xl mx-auto px-4 text-center">
